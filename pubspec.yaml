name: logiroute
description: Система управления логистикой грузоперевозок
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  
  # WebSocket GPS
  web_socket_channel: ^3.0.1

  # Firebase
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.0.2
  cloud_functions: ^6.0.6
  firebase_storage: ^13.0.6
  firebase_analytics: ^12.1.2
  
  # Maps & Location
  google_maps_flutter: ^2.17.0
  google_maps_flutter_web: ^0.6.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  image_picker: ^1.1.2
  
  # Background & Notifications
  flutter_local_notifications: ^18.0.1
  android_alarm_manager_plus: ^4.0.3
  flutter_background_service: ^5.0.10
  flutter_background_service_android: ^6.2.4
  firebase_messaging: ^16.1.1
  timezone: ^0.9.2
  
  # State Management
  provider: ^6.1.1
  
  # UI
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # Utilities
  shared_preferences: ^2.2.2
  uuid: ^4.2.1
  http: ^1.1.2
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.2.2
  google_polyline_algorithm: ^3.1.0
  
  # Printing
  pdf: ^3.11.3
  printing: ^5.13.4
  
  # Crypto (SHA-256 for immutable snapshot hash)
  crypto: ^3.0.3
  
  # Excel/CSV Import
  file_picker: ^8.1.6
  csv: ^6.0.0
  excel: ^4.0.6
  xml: ^6.5.0
  
  # Web APIs (замена для dart:html и dart:js)
  web: ^1.1.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.0.1

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    # 🧩 Просто указываем папку — Flutter автоматически подхватит все шрифты
    - assets/fonts/
    # 🔐 Файл с переменными окружения
    - .env.local
    # 🖼 Логотип приложения
    - assets/logo.png
    - assets/company_logo.png

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
    - family: NotoSansHebrew
      fonts:
        - asset: assets/fonts/NotoSansHebrew-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansHebrew-Bold.ttf
          weight: 700
