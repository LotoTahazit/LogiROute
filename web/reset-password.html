<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogiRoute — новый пароль</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); width: 100%; max-width: 400px; }
    h1 { font-size: 20px; color: #1976d2; margin: 0 0 8px; }
    p { color: #555; margin: 0 0 20px; font-size: 14px; line-height: 1.5; }
    label { display: block; font-size: 13px; margin-bottom: 4px; color: #333; }
    input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    button, a.btn { display: block; width: 100%; padding: 14px; background: #1976d2; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; text-align: center; text-decoration: none; box-sizing: border-box; }
    button:disabled { opacity: .6; cursor: wait; }
    .msg { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
    .err { background: #fdecea; color: #c62828; }
    .ok { background: #e8f5e9; color: #2e7d32; }
    .warn { background: #fff8e1; color: #795548; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>LogiRoute</h1>
    <p id="hint">Введите новый пароль для вашего аккаунта.</p>
    <form id="form">
      <label for="p1">Новый пароль</label>
      <input id="p1" type="password" minlength="6" required autocomplete="new-password">
      <label for="p2">Подтвердите пароль</label>
      <input id="p2" type="password" minlength="6" required autocomplete="new-password">
      <button type="submit" id="btn">Сохранить пароль</button>
    </form>
    <div id="msg" class="msg"></div>
    <a id="home" class="btn" href="/" style="display:none;margin-top:12px;">На страницу входа</a>
  </div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
    import { getAuth, confirmPasswordReset } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';

    function parseAuthParams() {
      const tryParams = (search) => {
        if (!search) return {};
        const q = new URLSearchParams(search.startsWith('?') ? search.slice(1) : search);
        return { mode: q.get('mode'), oobCode: q.get('oobCode') };
      };
      let p = tryParams(location.search);
      if (!p.oobCode && location.hash) {
        p = tryParams(location.hash.replace(/^#/, ''));
      }
      if (!p.oobCode) {
        const cont = new URLSearchParams(location.search).get('continueUrl');
        if (cont) {
          try {
            const u = new URL(decodeURIComponent(cont));
            p = tryParams(u.search);
          } catch (_) {}
        }
      }
      return p;
    }

    const app = initializeApp({
      apiKey: 'AIzaSyAR0UQPT5RMlEOFg8rTV_NbYl4yQMbhJbE',
      authDomain: 'logiroute-app.firebaseapp.com',
      projectId: 'logiroute-app',
    });
    const auth = getAuth(app);
    const { oobCode, mode } = parseAuthParams();
    const form = document.getElementById('form');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');
    const home = document.getElementById('home');

    function show(text, kind) {
      msg.textContent = text;
      msg.className = 'msg ' + kind;
      msg.style.display = 'block';
    }

    if (!oobCode) {
      form.style.display = 'none';
      document.getElementById('hint').textContent = '';
      show(
        'Откройте ссылку из письма «Сброс пароля» (в ней должен быть длинный код в адресе). ' +
        'Если вы просто зашли на эту страницу — запросите письмо на экране входа.',
        'warn'
      );
      home.style.display = 'block';
    } else if (mode && mode !== 'resetPassword') {
      form.style.display = 'none';
      document.getElementById('hint').textContent = '';
      show('Неверный тип ссылки. Запросите новое письмо для сброса пароля.', 'err');
      home.style.display = 'block';
    } else {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const p1 = document.getElementById('p1').value;
        const p2 = document.getElementById('p2').value;
        if (p1.length < 6) { show('Пароль слишком короткий (минимум 6 символов).', 'err'); return; }
        if (p1 !== p2) { show('Пароли не совпадают.', 'err'); return; }
        btn.disabled = true;
        try {
          await confirmPasswordReset(auth, oobCode, p1);
          form.style.display = 'none';
          show('Пароль изменён. Войдите с новым паролем.', 'ok');
          home.style.display = 'block';
        } catch (err) {
          const code = err.code || '';
          if (code.includes('expired-action-code') || code.includes('invalid-action-code')) {
            show('Ссылка истекла или уже использована. Запросите новое письмо.', 'err');
          } else {
            show('Ошибка: ' + (err.message || code), 'err');
          }
          home.style.display = 'block';
          btn.disabled = false;
        }
      });
    }
  </script>
</body>
</html>
